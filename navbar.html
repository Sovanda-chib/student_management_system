<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px 20px;
        }
        .navbar .brand {
            color: #fff;
            font-size: 1.2rem;
            text-decoration: none;
        }
        .navbar nav {
            display: flex;
            gap: 20px;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
        }
        .navbar a:hover {
            background-color: #575757;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="#" class="brand">Student Management</a>
        <nav>
            <a href="#home">Home</a>
            <a href="#profile">Profile</a>
            <a href="#contact">Contact</a>
            <a href="#category">Category</a>
        </nav>
        
    </header>
</body>
</html>
