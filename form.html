<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>50/50 Overlay Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
    font-family: Arial;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
}

/* MAIN */
.container {
    width: 700px;
    height: 400px;
    background: #fff;
    border-radius: 12px;
    display: flex;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* 50/50 */
.box {
    width: 50%;
    padding: 30px;
}

/* TEXT */
h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 90%;
    padding: 8px;
    margin: 8px auto;
    display: block;
}

/* BUTTON */
button {
    width: 60%;
    padding: 8px;
    margin: 10px auto;
    display: block;
    border: none;
    border-radius: 6px;
    background: #4facfe;
    color: white;
    cursor: pointer;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 50%;
    height: 100%;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    top: 0;
    left: 0;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: 0.5s;
}

/* ACTIVE = MOVE RIGHT */
.container.active .overlay {
    left: 50%;
}
</style>

</head>
<body>

<div class="container" id="container">

    <!-- LOGIN LEFT -->
    <div class="box">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

    <!-- REGISTER RIGHT -->
    <div class="box">
        <h2>Register</h2>
        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Register</button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay">
        <div>
            <h3 id="title">Welcome</h3>
            <p id="text">Login or Register</p>
            <button onclick="toggle()">Switch</button>
        </div>
    </div>

</div>

<script>
function toggle() {
    const c = document.getElementById("container");
    c.classList.toggle("active");

    let title = document.getElementById("title");
    let text = document.getElementById("text");

    if(c.classList.contains("active")) {
        title.innerHTML = "Hello!";
        text.innerHTML = "Register on right";
    } else {
        title.innerHTML = "Welcome";
        text.innerHTML = "Login on left";
    }
}
</script>

</body>
</html>
